<!DOCTYPE html>
<html>
<head>
    <title>AI Credit Intelligence</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
        }

        .header {
            padding: 20px 40px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
        }

        .container {
            display: flex;
            padding: 40px;
            gap: 40px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            flex: 1;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
            outline: none;
            background-color: #1c2b36;
            color: white;
        }

        /* IMPORTANT FIX FOR DROPDOWN OPTIONS */
        select option {
            background-color: #1c2b36;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00c6ff;
        }

        .risk-meter {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
        }

        .badge {
            text-align: center;
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 15px;
            font-weight: bold;
            display: inline-block;
        }

        .low { background: #28a745; }
        .medium { background: #ffc107; color: black; }
        .high { background: #dc3545; }

        .explanation {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.8;
            text-align: center;
        }

        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            opacity: 0.6;
        }

        @media(max-width: 900px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="header">
    <h1>AI Credit Risk Intelligence Platform</h1>
    <span>Model v1.0 | Live Deployment</span>
</div>

<div class="container">

    <div class="card">
        <h2>Applicant Information</h2>

        <input id="credit" placeholder="Credit Amount" type="number" />
        <input id="goods" placeholder="Goods Price" type="number" />
        <input id="days" placeholder="Days Employed" type="number" />
        <input id="ext" placeholder="External Risk Score (0-1)" step="0.01" type="number" />

        <select id="income">
            <option value="Working">Working</option>
            <option value="Commercial associate">Commercial associate</option>
            <option value="Pensioner">Pensioner</option>
            <option value="State servant">State servant</option>
        </select>

        <select id="education">
            <option value="Secondary / secondary special">Secondary / secondary special</option>
            <option value="Higher education">Higher education</option>
            <option value="Incomplete higher">Incomplete higher</option>
        </select>

        <button onclick="predict()">Run AI Analysis</button>
    </div>

    <div class="card">
        <h2>Risk Analytics Dashboard</h2>

        <div class="risk-meter" id="probability">--%</div>
        <div id="badgeContainer" style="text-align:center;"></div>

        <div class="explanation" id="explanation">
            Awaiting analysis...
        </div>
    </div>

</div>

<div class="footer">
    Powered by Logistic Regression | Feature Scaling | SMOTE | FastAPI
</div>

<script>
async function predict() {

    const credit = parseFloat(document.getElementById("credit").value);
    const goods = parseFloat(document.getElementById("goods").value);
    const days = parseFloat(document.getElementById("days").value);
    const ext = parseFloat(document.getElementById("ext").value);

    if (isNaN(credit) || isNaN(goods) || isNaN(days) || isNaN(ext)) {
        alert("Please fill all numeric fields.");
        return;
    }

    document.getElementById("probability").innerHTML = "Analyzing...";
    document.getElementById("badgeContainer").innerHTML = "";
    document.getElementById("explanation").innerHTML = "";

    const response = await fetch('/predict', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            AMT_CREDIT: credit,
            AMT_GOODS_PRICE: goods,
            DAYS_EMPLOYED: days,
            EXT_SOURCE_3: ext,
            NAME_INCOME_TYPE: document.getElementById("income").value,
            NAME_EDUCATION_TYPE: document.getElementById("education").value
        })
    });

    const data = await response.json();

    const percentage = (data.default_probability * 100).toFixed(2);
    document.getElementById("probability").innerHTML = percentage + "%";

    let badgeClass = "";
    if (data.risk_level === "Low Risk") badgeClass = "low";
    else if (data.risk_level === "Medium Risk") badgeClass = "medium";
    else badgeClass = "high";

    document.getElementById("badgeContainer").innerHTML =
        `<span class="badge ${badgeClass}">${data.risk_level}</span>`;

    document.getElementById("explanation").innerHTML =
        "AI evaluated financial indicators and estimated credit default probability accordingly.";
}
</script>

</body>
</html>
